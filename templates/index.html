{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Caixas</h2>

    {% for c in caixas %}
        <div>
            <strong>{{ c.codigo }}</strong> - {{ c.vendedor }}
            <a href="{{ url_for('detalhe_caixa', id=c.id) }}">Ver</a>
        </div>
    {% endfor %}
</div>

{% endblock %}
