{% extends "base.html" %}

{% block title %}Novo registro | Teste Hackathon{% endblock %}

{% block content %}
<section class="card form-card">
    <h2>Novo registro</h2>
    <p class="subtitle">Preencha os campos abaixo para cadastrar um novo item.</p>

    <form method="POST" class="form-grid">
        <div>
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" required>
        </div>

        <div>
            <label for="categoria">Categoria</label>
            <input type="text" id="categoria" name="categoria" required>
        </div>

        <div>
            <label for="valor">Valor</label>
            <input type="number" step="0.01" id="valor" name="valor" required>
        </div>

        <div>
            <label for="status">Status</label>
            <select id="status" name="status" required>
                <option value="">Selecione</option>
                <option value="Pendente">Pendente</option>
                <option value="Em andamento">Em andamento</option>
                <option value="Concluído">Concluído</option>
            </select>
        </div>

        <div>
            <label for="data_registro">Data</label>
            <input type="date" id="data_registro" name="data_registro" required>
        </div>

        <div class="full-width">
            <button class="btn" type="submit">Salvar</button>
        </div>
    </form>
</section>
{% endblock %}
