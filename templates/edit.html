{% extends "base.html" %}

{% block title %}Editar registro | Teste Hackathon{% endblock %}

{% block content %}
<section class="card form-card">
    <h2>Editar registro</h2>
    <p class="subtitle">Atualize os dados do registro selecionado.</p>

    <form method="POST" class="form-grid">
        <div>
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" value="{{ registro.nome }}" required>
        </div>

        <div>
            <label for="categoria">Categoria</label>
            <input type="text" id="categoria" name="categoria" value="{{ registro.categoria }}" required>
        </div>

        <div>
            <label for="valor">Valor</label>
            <input type="number" step="0.01" id="valor" name="valor" value="{{ registro.valor }}" required>
        </div>

        <div>
            <label for="status">Status</label>
            <select id="status" name="status" required>
                <option value="Pendente" {% if registro.status == "Pendente" %}selected{% endif %}>Pendente</option>
                <option value="Em andamento" {% if registro.status == "Em andamento" %}selected{% endif %}>Em andamento</option>
                <option value="Concluído" {% if registro.status == "Concluído" %}selected{% endif %}>Concluído</option>
            </select>
        </div>

        <div>
            <label for="data_registro">Data</label>
            <input
                type="date"
                id="data_registro"
                name="data_registro"
                value="{{ registro.data_registro.strftime('%Y-%m-%d') }}"
                required
            >
        </div>

        <div class="full-width">
            <button class="btn" type="submit">Atualizar</button>
        </div>
    </form>
</section>
{% endblock %}
