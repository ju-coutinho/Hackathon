{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Caixa {{ caixa.codigo }}</h2>

    <a class="btn" href="{{ url_for('criar_item', caixa_id=caixa.id) }}">
        Adicionar Item
    </a>

    <hr>

    {% for i in itens %}
        <div>
            {{ i.codigo }} - {{ i.descricao }} ({{ i.divergencia }})
        </div>
    {% endfor %}
</div>

{% endblock %}
